{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="titulo-seccion mb-4">{{ action }} Rutina</h1>
        <div class="card p-4">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label" style="color:#FFD600;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div style="color:red; font-size:0.85rem;">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-amarillo w-100">{{ action }}</button>
                <a href="/pages/" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
