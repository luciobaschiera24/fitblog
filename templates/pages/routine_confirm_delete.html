{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h2 style="color:#FFD600;">⚠️ Confirmar borrado</h2>
            <p class="mt-3" style="color:#ccc;">
                ¿Estás seguro que querés borrar la rutina 
                <strong style="color:#FFD600;">{{ routine.title }}</strong>?
            </p>
            <p style="color:#aaa;">Esta acción no se puede deshacer.</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">Sí, borrar</button>
                <a href="/pages/" class="btn btn-outline-warning">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
